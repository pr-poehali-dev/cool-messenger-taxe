<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#060810"/>
  <rect x="16" y="16" width="480" height="480" rx="48" fill="#060810" stroke="#00ffff" stroke-width="3" opacity="0.6"/>
  <!-- Grid lines -->
  <line x1="16" y1="170" x2="496" y2="170" stroke="#00ffff" stroke-width="0.8" opacity="0.12"/>
  <line x1="16" y1="340" x2="496" y2="340" stroke="#00ffff" stroke-width="0.8" opacity="0.12"/>
  <line x1="170" y1="16" x2="170" y2="496" stroke="#00ffff" stroke-width="0.8" opacity="0.12"/>
  <line x1="340" y1="16" x2="340" y2="496" stroke="#00ffff" stroke-width="0.8" opacity="0.12"/>
  <!-- TX text -->
  <text x="256" y="310" font-family="monospace" font-size="170" font-weight="900" fill="#00ffff" text-anchor="middle"
    filter="url(#glow2)">TX</text>
  <defs>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Corner accents -->
  <path d="M16 80 L16 16 L80 16" stroke="#00ffff" stroke-width="6" fill="none" opacity="0.8"/>
  <path d="M432 16 L496 16 L496 80" stroke="#00ffff" stroke-width="6" fill="none" opacity="0.8"/>
  <path d="M16 432 L16 496 L80 496" stroke="#00ffff" stroke-width="6" fill="none" opacity="0.8"/>
  <path d="M432 496 L496 496 L496 432" stroke="#00ffff" stroke-width="6" fill="none" opacity="0.8"/>
</svg>
