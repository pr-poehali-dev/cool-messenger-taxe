<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" fill="#060810"/>
  <rect x="8" y="8" width="176" height="176" rx="24" fill="#060810" stroke="#00ffff" stroke-width="2" opacity="0.6"/>
  <!-- Grid lines -->
  <line x1="8" y1="64" x2="184" y2="64" stroke="#00ffff" stroke-width="0.5" opacity="0.15"/>
  <line x1="8" y1="128" x2="184" y2="128" stroke="#00ffff" stroke-width="0.5" opacity="0.15"/>
  <line x1="64" y1="8" x2="64" y2="184" stroke="#00ffff" stroke-width="0.5" opacity="0.15"/>
  <line x1="128" y1="8" x2="128" y2="184" stroke="#00ffff" stroke-width="0.5" opacity="0.15"/>
  <!-- TX text -->
  <text x="96" y="116" font-family="monospace" font-size="64" font-weight="900" fill="#00ffff" text-anchor="middle" opacity="0.9"
    filter="url(#glow)">TX</text>
  <!-- Glow filter -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Corner accents -->
  <path d="M8 32 L8 8 L32 8" stroke="#00ffff" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M160 8 L184 8 L184 32" stroke="#00ffff" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M8 160 L8 184 L32 184" stroke="#00ffff" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M160 184 L184 184 L184 160" stroke="#00ffff" stroke-width="3" fill="none" opacity="0.8"/>
</svg>
